# การตั้งค่า deploy — ລະບົບຈັດການໂຮງແຮມ (Hotel Management)
app_name: "hotelp1"
app_user: "root"
app_group: "root"

# server-side paths
app_root: "/opt/hotelp1"
server_releases: "{{ app_root }}/releases"
server_current: "{{ app_root }}/current"
server_shared: "{{ app_root }}/shared"

# local repo (รัน ansible จาก root โปรเจกต์)
local_repo: "/home/bird/Desktop/Hotel_Management"
local_frontend_dist: "{{ local_repo }}/out/dist"
local_api_dist: "{{ local_repo }}/out/server"
local_entrypoint: "{{ local_repo }}/index.ts"
local_sql_dir: "{{ local_repo }}/src/server/platform/db/migrations"

# runtime
bun_bin: "/root/.bun/bin/bun"
api_service: "hotelp1"
api_port: 3003

# env — ไฟล์ local ที่จะ copy ไปเซิร์ฟเวอร์ (path สัมพันธ์กับ local_repo หรือ absolute)
# ตัวอย่าง: deploy/templates/env.production หรือ .env.production
app_env_source: "deploy/templates/env.demo"
app_env_dest: "/etc/{{ app_name }}.env"
# true = overwrite ทุกครั้งที่รัน setup/deploy · false = copy เฉพาะเมื่อยังไม่มีบนเซิร์ฟเวอร์
app_env_force: true

keep_releases: 3

# domain + SSL
api_domain: "hotelp1.clickcraft.dev"
ssl_email: "bkeonavong@gmail.com"
ssl_country: "LA"
ssl_state: "Vientiane"
ssl_organization: "Clickcraft"
