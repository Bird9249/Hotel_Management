- name: Ensure bun available for local build
  debug:
    msg: "Requires bun on localhost in PATH; install from https://bun.sh if missing"

- name: Run production build (frontend + API)
  delegate_to: localhost
  run_once: true
  become: false
  command: bun run build:all
  args:
    chdir: "{{ local_repo }}"

- name: Assert production entrypoint exists
  delegate_to: localhost
  run_once: true
  become: false
  stat: { path: "{{ local_entrypoint }}" }
  register: entrypoint_file

- name: Fail if index.ts missing
  delegate_to: localhost
  run_once: true
  become: false
  fail: { msg: "index.ts missing at repo root — build/deploy setup error" }
  when: not entrypoint_file.stat.exists

- name: Assert compiled API exists
  delegate_to: localhost
  run_once: true
  become: false
  stat: { path: "{{ local_api_dist }}/main.js" }
  register: api_bundle

- name: Fail if compiled API missing
  delegate_to: localhost
  run_once: true
  become: false
  fail: { msg: "out/server/main.js missing — run `bun run build:all` failed" }
  when: not api_bundle.stat.exists

- name: Assert frontend dist exists
  delegate_to: localhost
  run_once: true
  become: false
  stat: { path: "{{ local_frontend_dist }}" }
  register: frontend_dist

- name: Fail if frontend dist missing
  delegate_to: localhost
  run_once: true
  become: false
  fail: { msg: "out/dist missing — run `bun run build:all` failed" }
  when: not frontend_dist.stat.exists
