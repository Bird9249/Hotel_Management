- name: Create server release dir
  file:
    path: "{{ server_releases }}/{{ release_id }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Copy production entrypoint
  copy:
    src: "{{ local_entrypoint }}"
    dest: "{{ server_releases }}/{{ release_id }}/index.ts"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"

- name: Rsync frontend dist
  synchronize:
    src: "{{ local_frontend_dist }}/"
    dest: "{{ server_releases }}/{{ release_id }}/dist/"
    rsync_opts: ["--delete", "--mkpath"]
  delegate_to: localhost
  become: false

- name: Rsync compiled API
  synchronize:
    src: "{{ local_api_dist }}/"
    dest: "{{ server_releases }}/{{ release_id }}/out/server/"
    rsync_opts: ["--delete", "--mkpath"]
  delegate_to: localhost
  become: false

- name: Create shared uploads directory
  file:
    path: "{{ server_shared }}/uploads"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Create shared upload subdirectories
  file:
    path: "{{ server_shared }}/uploads/{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  loop:
    - "avatars"

- name: Point server current -> this release
  file:
    src: "{{ server_releases }}/{{ release_id }}"
    dest: "{{ server_current }}"
    state: link
    force: true

- name: daemon-reload
  command: systemctl daemon-reload

- name: Restart API
  systemd:
    name: "{{ api_service }}"
    state: restarted
    enabled: true

- name: Wait for API service to start
  wait_for:
    port: "{{ api_port }}"
    host: "127.0.0.1"
    delay: 5
    timeout: 30

- name: Check API service status
  systemd:
    name: "{{ api_service }}"
  register: api_status

- name: Fail if API service is not running
  fail:
    msg: "API service failed to start"
  when: api_status.status.ActiveState != "active"
